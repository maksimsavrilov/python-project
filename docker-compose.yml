services:
  db:
    image: postgres:15-alpine
    container_name: postgres_smart_home
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data:Z
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:Z
    restart: unless-stopped

  web-dev:
    image: localhost/my-fastapi-app:dev
    build:
      context: .
      target: development
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app:z
    environment:
      - ENV=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
    depends_on:
      - db

  web-prod:
    image: localhost/my-fastapi-app:prod
    build:
      context: .
      target: production
    ports:
      - "127.0.0.1:8080:8000"
    environment:
      - ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
    depends_on:
      - db

  frontend-dev:
    image: localhost/my-react-app:dev
    build:
      context: ./frontend
      target: development
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - web-dev

volumes:
  pgdata:
